<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>2F/C戶 - 3D 建築平面圖</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { overflow: hidden; background: #1a1a2e; font-family: sans-serif; }
    #app { width: 100vw; height: 100vh; }
    #info {
      position: absolute;
      top: 16px;
      left: 16px;
      color: #e0e0e0;
      background: rgba(0,0,0,0.7);
      padding: 12px 16px;
      border-radius: 8px;
      font-size: 14px;
      line-height: 1.6;
      pointer-events: none;
    }
    #controls {
      position: absolute;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
    }
    #controls button {
      padding: 8px 16px;
      border: 1px solid #555;
      background: rgba(0,0,0,0.7);
      color: #e0e0e0;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }
    #controls button:hover { background: rgba(60,60,80,0.9); }
    #controls button.active { background: rgba(80,80,120,0.9); border-color: #88f; }
  </style>
</head>
<body>
  <div id="app"></div>
  <div id="info">
    <strong>2F/C戶 - 雲川建築平面圖</strong><br>
    樓高 H=360cm<br>
    滑鼠拖曳旋轉 · 滾輪縮放 · 右鍵平移
  </div>
  <div id="controls">
    <button id="btn-3d" class="active">3D 視角</button>
    <button id="btn-top">俯視圖</button>
    <button id="btn-front">前視圖</button>
    <button id="btn-wireframe">線框模式</button>
  </div>
  <script type="module" src="/src/main.js"></script>
</body>
</html>
